<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Canopy Drone</title>
<link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="240" height="360"></canvas>

    <div id="hud">
      <span id="score">Score: 0</span>
      <span id="best">Best: 0</span>
    </div>

    <div id="game-over-screen" class="hidden">
      <h1 id="game-over-title">Game Over</h1>
      <p id="final-score">Score: 0</p>
      <button id="restart-button">Tap or press Space to restart</button>
    </div>

    <div id="touch-controls">
      <div id="touch-up" class="touch-zone"></div>
      <div id="touch-down" class="touch-zone"></div>
    </div>
  </div>

  <script src="components/game.js"></script>
</body>
</html>
